<div class="module-container">

  <!-- Header Hero -->
  <div class="module-hero purple">
    <div class="hero-content">
      <div class="hero-icon"><mat-icon>view_module</mat-icon></div>
      <div>
        <h1>Module Management</h1>
        <p>Control module availability and set limits across different subscription tiers.</p>
      </div>
    </div>
    <div class="hero-actions">
      <button mat-raised-button class="hero-btn">
        <mat-icon>add</mat-icon> Add New Module
      </button>
    </div>
  </div>

  <!-- Summary Stats -->
  <app-module-stats [stats]="statCards"></app-module-stats>

  <!-- Modules Table -->
  <mat-card class="transactions-card">
    <div class="card-header-row">
      <div>
        <h3 class="card-title" style="font-weight: 800; font-size: 1.4rem;">Available Modules</h3>
      </div>
      <div class="header-actions">
        <div class="search-box">
          <mat-icon>search</mat-icon>
          <input type="text" placeholder="Search modules..." (keyup)="applySearch($event)">
        </div>
      </div>
    </div>
    <table mat-table [dataSource]="dataSource" class="full-width-table">
      
      <!-- Icon Column -->
      <ng-container matColumnDef="icon">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <div class="module-icon-wrap">
            <mat-icon>{{row.icon}}</mat-icon>
          </div>
        </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Module Name</th>
        <td mat-cell *matCellDef="let row">
          <div class="role-info">
            <strong>{{row.name}}</strong>
            <span class="desc-text">{{row.description}}</span>
          </div>
        </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <span class="status-badge" [class]="row.status.toLowerCase()">{{row.status}}</span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-raised-button class="manage-btn" (click)="openDrawer(row)">
            <mat-icon>layers</mat-icon> Manage Limits
          </button>
          <button mat-icon-button [matTooltip]="row.status === 'Active' ? 'Deactivate' : 'Activate'" class="action-btn" (click)="toggleStatus(row)">
            <mat-icon>{{row.status === 'Active' ? 'visibility' : 'visibility_off'}}</mat-icon>
          </button>
          <button mat-icon-button matTooltip="More Options" class="action-btn" [matMenuTriggerFor]="modMenu">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #modMenu="matMenu" xPosition="before">
            <button mat-menu-item>
              <mat-icon>edit</mat-icon>
              <span>Edit Module</span>
            </button>
            <button mat-menu-item>
              <mat-icon>content_copy</mat-icon>
              <span>Duplicate Module</span>
            </button>
            <mat-divider></mat-divider>
            <button mat-menu-item class="danger-text">
              <mat-icon color="warn">delete</mat-icon>
              <span style="color: #ef4444;">Delete Module</span>
            </button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>

  <!-- Side Drawer Component -->
  <app-module-drawer 
    [module]="selectedModule" 
    [isOpen]="isDrawerOpen" 
    (close)="closeDrawer()" 
    (save)="saveLimits($event)">
  </app-module-drawer>

</div>
